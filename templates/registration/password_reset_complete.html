<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Senha alterada • Axia NOC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {% load static %}
  <link rel="stylesheet" href="{% static 'livro_monitoramento/axia.css' %}?v=20">
</head>

<body class="login-page">

  <div class="login-topbar">
    <div class="brand">
      <span class="brand-dot"></span>
      <div>
        <div class="brand-title">Axia NOC</div>
        <div class="brand-sub">Livro de Monitoramento</div>
      </div>
    </div>

    <button id="themeToggle" class="btn btn-ghost">🌙 Escuro</button>
  </div>

  <div class="login-wrapper">
    <div class="card login-card">
      <div class="card-head">
        <div class="card-title">Senha alterada com sucesso</div>
        <div class="muted">Agora você já pode entrar com a nova senha.</div>
      </div>

      <div class="actions">
        <a href="{% url 'login_page' %}" class="btn btn-primary">Ir para o login</a>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const root = document.documentElement;
      const btn = document.getElementById("themeToggle");
      const saved = localStorage.getItem("axia-theme");
      if (saved) root.setAttribute("data-theme", saved);

      function refreshLabel() {
        btn.innerText =
          root.getAttribute("data-theme") === "light"
            ? "🌙 Escuro"
            : "☀️ Claro";
      }
      refreshLabel();

      btn.addEventListener("click", () => {
        const next = root.getAttribute("data-theme") === "light" ? "dark" : "light";
        root.setAttribute("data-theme", next);
        localStorage.setItem("axia-theme", next);
        refreshLabel();
      });
    })();
  </script>

</body>
</html>
