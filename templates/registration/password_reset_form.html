<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Recuperar senha • Axia NOC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {% load static %}
  <link rel="stylesheet" href="{% static 'livro_monitoramento/axia.css' %}?v=20">
</head>

<body class="login-page">

  <div class="login-topbar">
    <div class="brand">
      <span class="brand-dot"></span>
      <div>
        <div class="brand-title">Axia NOC</div>
        <div class="brand-sub">Livro de Monitoramento</div>
      </div>
    </div>

    <button id="themeToggle" class="btn btn-ghost">🌙 Escuro</button>
  </div>

  <div class="login-wrapper">
    <div class="card login-card">
      <div class="card-head">
        <div class="card-title">Recuperar senha</div>
        <div class="muted">Informe seu e-mail cadastrado para receber o link</div>
      </div>

      <form method="post" class="form">
        {% csrf_token %}

        <div class="field">
          <label>E-mail</label>
          {{ form.email }}
          <div class="hint">Use o e-mail que está no seu cadastro.</div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" type="submit">Enviar link</button>
          <a href="{% url 'login_page' %}" class="btn btn-ghost">Voltar</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    (function () {
      const root = document.documentElement;
      const btn = document.getElementById("themeToggle");
      const saved = localStorage.getItem("axia-theme");
      if (saved) root.setAttribute("data-theme", saved);

      function refreshLabel() {
        btn.innerText =
          root.getAttribute("data-theme") === "light"
            ? "🌙 Escuro"
            : "☀️ Claro";
      }
      refreshLabel();

      btn.addEventListener("click", () => {
        const next = root.getAttribute("data-theme") === "light" ? "dark" : "light";
        root.setAttribute("data-theme", next);
        localStorage.setItem("axia-theme", next);
        refreshLabel();
      });
    })();
  </script>

</body>
</html>
